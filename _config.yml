title: The Generative Brain
description: "Elan Barenholtz, PhD — The Autoregressive Brain: A new framework for cognition, memory, and consciousness"
url: "https://generativebrain.blog"
baseurl: ""

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:title/

# Collections
collections:
  pages:
    output: true
    permalink: /:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - RESUME.txt
  - SESSION_LOG.md
  - .DS_Store

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
