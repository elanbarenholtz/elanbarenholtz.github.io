title: The Autoregressive Brain
description: "Elan Barenholtz, PhD — A unified theory of memory, attention, perception, learning, and behavior"
url: "https://autoregressivebrain.blog"
baseurl: ""

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:title/

# Collections
collections:
  pages:
    output: true
    permalink: /:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - RESUME.txt
  - SESSION_LOG.md
  - .DS_Store

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
