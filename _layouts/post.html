---
layout: default
---
<article>
  <div class="post-header">
    <div class="container">
      <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</p>
      <h1>{{ page.title }}</h1>
      {% if page.tags %}
      <div class="post-tags">
        {% for tag in page.tags %}
        <span class="tag">{{ tag }}</span>
        {% endfor %}
      </div>
      {% endif %}
    </div>
  </div>
  <div class="post-body">
    <div class="container">
      <div class="prose">
        {{ content }}
      </div>
    </div>
  </div>
</article>
